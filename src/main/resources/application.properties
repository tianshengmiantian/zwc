# suppress inspection "UnusedProperty" for whole file
spring.application.name=westart

# API keys are read from environment variables. Never put real keys in this file.
bailian.api-key=${DASHSCOPE_API_KEY:}
bailian.chat-url=${DASHSCOPE_CHAT_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
bailian.text-model=${DASHSCOPE_TEXT_MODEL:qwen3.7-plus}
bailian.vision-model=${DASHSCOPE_VISION_MODEL:qwen3.7-plus}
bailian.asr-url=${DASHSCOPE_ASR_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
bailian.asr-model=${DASHSCOPE_ASR_MODEL:qwen3-asr-flash}
bailian.tts-url=${DASHSCOPE_TTS_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
bailian.tts-model=${DASHSCOPE_TTS_MODEL:qwen3-tts-flash}
bailian.tts-voice=${DASHSCOPE_TTS_VOICE:Cherry}
bailian.tts-sample-rate=${DASHSCOPE_TTS_SAMPLE_RATE:24000}
bailian.image-url=${DASHSCOPE_IMAGE_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
bailian.image-model=${DASHSCOPE_IMAGE_MODEL:qwen-image-2.0}
bailian.image-size=${DASHSCOPE_IMAGE_SIZE:1024*1024}
audio.ffmpeg-path=${FFMPEG_PATH:ffmpeg}

qweather.api-key=${QWEATHER_API_KEY:}
qweather.api-host=${QWEATHER_API_HOST:}

websearch.api-key=${WEBSARCH_API_KEY:}
websearch.api-url=${WEBSARCH_API_URL:}

# WeChat iLink Bot. Login credentials are optional and must only come from environment variables.
wechat.bot.enabled=${WECHAT_BOT_ENABLED:true}
wechat.bot.default-location=${WECHAT_DEFAULT_LOCATION:\u5317\u4EAC}
wechat.bot.token=${ILINK_BOT_TOKEN:}
wechat.bot.user-id=${ILINK_USER_ID:}
wechat.bot.bot-id=${ILINK_BOT_ID:}
wechat.bot.base-url=${ILINK_BASE_URL:https://ilinkai.weixin.qq.com}
wechat.bot.admin-key=${WECHAT_BOT_ADMIN_KEY:}
wechat.bot.max-accounts=${WECHAT_BOT_MAX_ACCOUNTS:3}

# Embedded persistent database. The generated data directory is ignored by Git.
spring.datasource.url=${WESTART_DATABASE_URL:jdbc:h2:file:./data/westart}
spring.datasource.username=${WESTART_DATABASE_USERNAME:sa}
spring.datasource.password=${WESTART_DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Per-user conversation memory and persistent WeChat message deduplication.
conversation.context-message-limit=${CONVERSATION_CONTEXT_MESSAGE_LIMIT:12}
conversation.stored-message-limit=${CONVERSATION_STORED_MESSAGE_LIMIT:200}
conversation.summary-batch-size=${CONVERSATION_SUMMARY_BATCH_SIZE:10}
conversation.summary-max-chars=${CONVERSATION_SUMMARY_MAX_CHARS:1200}
wechat.message-dedup-retention-days=${WECHAT_MESSAGE_DEDUP_RETENTION_DAYS:7}
